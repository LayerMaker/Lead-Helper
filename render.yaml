services:
  - type: web
    name: lead-helper
    runtime: node
    buildCommand: npm ci && npx playwright install chromium && npm run build
    startCommand: npm start
    autoDeployTrigger: commit
    envVars:
      - key: NODE_VERSION
        value: 24
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_OCR_MODEL
        value: qwen/qwen-vl-plus
      - key: OPENROUTER_EMAIL_MODEL
        value: openai/gpt-5-mini
